steps:
  # Step 0: Retrieve Firebase token from Secret Manager
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-firebase-token'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud secrets versions access latest --secret=firebase-token > /workspace/firebase-token.txt'
    
  # Step 0b: Retrieve API keys
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-api-keys'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud secrets versions access latest --secret=GOOGLE_API_KEY > /workspace/google-api-key.txt
        gcloud secrets versions access latest --secret=GOOGLE_GENERATIVE_AI_API_KEY > /workspace/google-genai-key.txt

  # Step 0c: Retrieve firebase_options.dart (Crucial for Cloud Build)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-firebase-options'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud secrets versions access latest --secret=firebase-options-dart > lib/firebase_options.dart'

  # Step 1: Build Flutter Web App in the Cloud
  - name: 'ghcr.io/cirruslabs/flutter:3.24.3'
    id: 'build-flutter-web'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        flutter config --enable-web
        flutter build web --release
    waitFor: ['get-firebase-options']

  # Step 2: Build Docker image for Frontend
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'TOKEN=$(cat /workspace/firebase-token.txt); docker build --build-arg FIREBASE_TOKEN="$$TOKEN" -t gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA -t gcr.io/$PROJECT_ID/elderly-ai-care-app:latest .'
    waitFor: ['build-flutter-web', 'get-firebase-token']

  # Step 3: Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA'
    waitFor: ['build-image']

  # Step 4: Deploy Frontend to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-frontend'
    args:
      - 'deploy'
      - 'elderly-ai-care-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    waitFor: ['push-image']

  # Step 5: Build Backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        GOOGLE_API_KEY=$(cat /workspace/google-api-key.txt)
        GOOGLE_GENAI_KEY=$(cat /workspace/google-genai-key.txt)
        docker build \
          -f Dockerfile.backend \
          --build-arg GOOGLE_API_KEY="$$GOOGLE_API_KEY" \
          --build-arg GOOGLE_GENERATIVE_AI_API_KEY="$$GOOGLE_GENAI_KEY" \
          -t gcr.io/$PROJECT_ID/caresync-backend:$SHORT_SHA \
          -t gcr.io/$PROJECT_ID/caresync-backend:latest \
          .
    waitFor: ['get-api-keys']

  # Step 6: Push Backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/caresync-backend:$SHORT_SHA'
    waitFor: ['build-backend']

  # Step 7: Deploy Backend to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-backend'
    args:
      - 'deploy'
      - 'caresync-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/caresync-backend:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8081'
    waitFor: ['push-backend']

images:
  - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:latest'
  - 'gcr.io/$PROJECT_ID/caresync-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/caresync-backend:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
