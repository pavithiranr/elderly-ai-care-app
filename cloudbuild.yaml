steps:
  # Step 1: Build Docker image with Firebase token passed as build argument
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg FIREBASE_TOKEN="$$FIREBASE_TOKEN" \
          -t gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA \
          -t gcr.io/$PROJECT_ID/elderly-ai-care-app:latest \
          .
    env:
      - 'FIREBASE_TOKEN=$_FIREBASE_TOKEN'
    waitFor: ['-']

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run (optional - adjust based on your needs)
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy'
    args:
      - 'deploy'
      - 'elderly-ai-care-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    waitFor: ['push-image']

images:
  - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'

# Reference the Firebase token secret from Google Cloud Secret Manager
secrets:
  - versionName: projects/caresync-vertex/secrets/firebase-token/versions/latest
    env: '_FIREBASE_TOKEN'
