steps:
  # Step 0: Retrieve Firebase token from Secret Manager and save to file
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-firebase-token'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'gcloud secrets versions access latest --secret=firebase-token > /workspace/firebase-token.txt'
    
  # Step 0b: Retrieve API keys from Secret Manager
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-api-keys'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud secrets versions access latest --secret=GOOGLE_API_KEY > /workspace/google-api-key.txt
        gcloud secrets versions access latest --secret=GOOGLE_GENERATIVE_AI_API_KEY > /workspace/google-genai-key.txt
    
  # Step 1: Build Docker image with Firebase token
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'TOKEN=$(cat /workspace/firebase-token.txt); docker build --build-arg FIREBASE_TOKEN="$TOKEN" -t gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA -t gcr.io/$PROJECT_ID/elderly-ai-care-app:latest .'
    waitFor: ['get-firebase-token']

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA'
    waitFor: ['build-image']

  # Step 3: Deploy Flutter web frontend to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-frontend'
    args:
      - 'deploy'
      - 'elderly-ai-care-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    waitFor: ['push-image']

  # Step 4: Build backend (Node.js FCM notification server) with API keys
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        GOOGLE_API_KEY=$(cat /workspace/google-api-key.txt)
        GOOGLE_GENAI_KEY=$(cat /workspace/google-genai-key.txt)
        docker build \
          -f Dockerfile.backend \
          --build-arg GOOGLE_API_KEY="$GOOGLE_API_KEY" \
          --build-arg GOOGLE_GENERATIVE_AI_API_KEY="$GOOGLE_GENAI_KEY" \
          -t gcr.io/$PROJECT_ID/caresync-backend:$SHORT_SHA \
          -t gcr.io/$PROJECT_ID/caresync-backend:latest \
          .
    waitFor: ['get-api-keys']

  # Step 5: Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/caresync-backend:$SHORT_SHA'
    waitFor: ['build-backend']

  # Step 6: Deploy backend to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-backend'
    args:
      - 'deploy'
      - 'caresync-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/caresync-backend:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8081'
    waitFor: ['push-backend']

images:
  - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/elderly-ai-care-app:latest'
  - 'gcr.io/$PROJECT_ID/caresync-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/caresync-backend:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
